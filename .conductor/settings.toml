"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Conductor project settings for Shaxda.
# Put this file at .conductor/settings.toml and commit it.
# Personal overrides go in .conductor/settings.local.toml and must be gitignored.

[scripts]
setup = "corepack enable && pnpm install"
archive = "rm -rf apps/web/.svelte-kit apps/web/build apps/worker/.wrangler"
run_mode = "concurrent"

# Main SvelteKit dev server.
# Root package.json should expose:
#   "dev:web": "pnpm --filter @shaxda/web dev"
[scripts.run.web]
command = "pnpm dev:web -- --host 0.0.0.0 --port $CONDUCTOR_PORT"
default = true
icon = "play"

# Cloudflare Worker local dev.
# Root package.json should expose:
#   "dev:worker": "pnpm --filter @shaxda/worker dev"
#
# Wrangler/Miniflare run Workers, Durable Objects, and D1 locally.
# The port offset lets web + worker run at the same time in one workspace.
[scripts.run.worker]
command = "pnpm dev:worker -- --port $((CONDUCTOR_PORT + 1))"
icon = "server"

# Fast test run.
[scripts.run.test]
command = "pnpm test"
icon = "check"

# Full review check.
# Root package.json should expose:
#   "check": "pnpm lint && pnpm typecheck && pnpm test && pnpm build"
[scripts.run.check]
command = "pnpm check"
icon = "check-circle"
